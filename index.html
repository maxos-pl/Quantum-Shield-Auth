<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Verification</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">
    <div class="auth-card" id="widget">
        <div class="auth-header">
            <span class="header-main">Security Check</span>
            <span class="header-sub">Identity Protection</span>
        </div>
        
        <div class="auth-content">
            <div class="verify-row" id="row1">
                <div class="track" id="track">
                    <div class="thumb" id="thumb">→</div>
                    <div class="track-label">Slide to verify</div>
                </div>
            </div>

            <div class="verify-row" id="row2">
                <div class="checkbox-area" id="checkCard">
                    <div class="check-box" id="checkBox">
                        <div class="spinner" id="spinner"></div>
                        <span class="check-icon" id="checkIcon">✓</span>
                    </div>
                    <span class="check-text">Confirm you are human</span>
                </div>
            </div>

            <div class="verify-row">
                <p class="cell-hint">Type word: <b id="targetWord">...</b></p>
                <div class="cell-container" id="cellGroup">
                    <input type="text" class="cell" maxlength="1" autocomplete="off">
                    <input type="text" class="cell" maxlength="1" autocomplete="off">
                    <input type="text" class="cell" maxlength="1" autocomplete="off">
                    <input type="text" class="cell" maxlength="1" autocomplete="off">
                    <input type="text" class="cell" maxlength="1" autocomplete="off">
                </div>
            </div>

            <div class="verify-row" id="row4">
                <button class="action-btn" id="smartBtn">Press and Hold</button>
            </div>
        </div>

        <div class="auth-footer" id="statusMsg">Waiting for input...</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
